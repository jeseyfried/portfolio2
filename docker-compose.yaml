services:
  jekyll-site:
    image: jekyll-site
    build: .
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - bundle:/usr/local/bundle
    ports:
      - "4000:4000"
    user: "1000:1000"
    command: bundle exec jekyll serve -H 0.0.0.0 -w --force_polling

volumes:
  bundle:
